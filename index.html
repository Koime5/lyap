<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyap.js — Ultra-lightweight Reactive Framework</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-center items-center p-6 text-center">
  <h1 class="text-5xl font-extrabold tracking-tight mb-4">
    ⚡ Lyap.js
  </h1>
  <p class="text-xl text-slate-400 max-w-md mb-8">
    An ultra-lightweight, fine-grained reactive engine blending the simplicity of HTML attributes with signal reactivity.
  </p>

  <!-- Showcase your shorthand syntax -->
  <div class="bg-slate-800 p-6 rounded-lg text-left font-mono text-sm max-w-lg w-full border border-slate-700 shadow-xl mb-8">
    <span class="text-slate-500">&lt;!-- Example Syntax --&gt;</span><br/>
    <span class="text-sky-400">&lt;div</span> <span class="text-amber-300">ly-data</span>=<span class="text-emerald-400">"{ count: 0 }"</span><span class="text-sky-400">&gt;</span><br/>
    &nbsp;&nbsp;<span class="text-sky-400">&lt;button</span> <span class="text-amber-300">@click</span>=<span class="text-emerald-400">"count++"</span><span class="text-sky-400">&gt;</span><br/>
    &nbsp;&nbsp;&nbsp;&nbsp;Clicks: <span class="text-sky-400">&lt;span</span> <span class="text-amber-300">:text</span>=<span class="text-emerald-400">"count"</span><span class="text-sky-400">&gt;&lt;/span&gt;</span><br/>
    &nbsp;&nbsp;<span class="text-sky-400">&lt;/button&gt;</span><br/>
    <span class="text-sky-400">&lt;/div&gt;</span>
  </div>

  <p class="text-sm text-slate-500">Coming Soon. Open Source.</p>
</body>
</html>
